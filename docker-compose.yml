services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3000
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - web
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.recipe-app.rule=Host(`${DOMAIN}`)'
      - 'traefik.http.routers.recipe-app.entrypoints=websecure'
      - 'traefik.http.routers.recipe-app.tls.certresolver=letsencrypt'
      - 'traefik.http.services.recipe-app.loadbalancer.server.port=3000'
      - 'traefik.http.routers.recipe-app-http.rule=Host(`${DOMAIN}`)'
      - 'traefik.http.routers.recipe-app-http.entrypoints=web'
      - 'traefik.http.routers.recipe-app-http.middlewares=redirect-to-https'

networks:
  web:
    external: true
