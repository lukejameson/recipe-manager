services:
  app:
    image: ghcr.io/lukejameson/marrow:latest
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3000
      - NODE_ENV=production
      # Optional: Set to "true" to run recipe structure migration on startup
      # - RECIPE_MIGRATION=${RECIPE_MIGRATION:-false}
    restart: unless-stopped
    networks:
      - web
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
        delay: 10s
      rollback_config:
        order: stop-first
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.recipe-app.rule=Host(`${DOMAIN}`)'
      - 'traefik.http.routers.recipe-app.entrypoints=websecure'
      - 'traefik.http.routers.recipe-app.tls.certresolver=letsencrypt'
      - 'traefik.http.services.recipe-app.loadbalancer.server.port=3000'
      - 'traefik.http.routers.recipe-app-http.rule=Host(`${DOMAIN}`)'
      - 'traefik.http.routers.recipe-app-http.entrypoints=web'
      - 'traefik.http.routers.recipe-app-http.middlewares=redirect-to-https'

networks:
  web:
    external: true
